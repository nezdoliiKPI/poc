syntax = "proto3";

option java_multiple_files = true;
option java_package = "dev.nez.edge.data";
option java_outer_classname = "DataProtos";

import "google/protobuf/timestamp.proto";

// Represents a single reading of power consumption telemetry from a device.
//
// @param timestamp The exact time the service received and processed this message (UTC).
// @param device_id The unique identifier of the sensor or device.
// @param voltage   The electrical voltage level in volts (V).
// @param current   The electrical current flow in amperes (A).
// @param power     The active power consumption in watts (W).
message PowerConsumptionData {
  google.protobuf.Timestamp timestamp = 5;
  int64 device_id = 1;
  float voltage = 2;
  float current = 3;
  float power = 4;
}

// Represents a single reading of air quality telemetry from a sensor.
//
// @param timestamp   The exact time the service received and processed this message (UTC).
// @param device_id   The unique identifier of the sensor or device.
// @param co2         Carbon Dioxide (CO2) concentration in parts per million (ppm).
// @param pm25        Particulate Matter (PM2.5) concentration in µg/m³.
// @param pm10        Particulate Matter (PM10) concentration in µg/m³.
// @param tvoc        Total Volatile Organic Compounds (TVOC) in mg/m³.
// @param temperature Ambient air temperature in degrees Celsius.
// @param humidity    Relative humidity percentage (0.0 to 100.0).
message AirQualityData {
  google.protobuf.Timestamp timestamp = 8;
  int64 device_id = 1;
  int32 co2 = 2;
  float pm25 = 3;
  float pm10 = 4;
  float tvoc = 5;
  float temperature = 6;
  float humidity = 7;
}

// Represents a single reading from a smoke and gas detection sensor.
//
// @param timestamp The exact time the service received and processed this message (UTC).
// @param device_id The unique identifier of the sensor or device.
// @param smoke_raw Raw analog or digital reading from the photoelectric/ionization smoke sensor.
// @param co_level  Carbon Monoxide (CO) concentration in parts per million (ppm).
message SmokeDetectorData {
  google.protobuf.Timestamp timestamp = 4;
  int64 device_id = 1;
  int32 smoke_raw = 2;
  int32 co_level = 3;
}

// Represents a single reading of battery status telemetry.
//
// @param timestamp The exact time the service received and processed this message (UTC).
// @param device_id The unique identifier of the sensor or device.
// @param val       The current battery voltage level in volts (V) or remaining capacity percentage.
message BatteryData {
  google.protobuf.Timestamp timestamp = 3;
  int64 device_id = 1;
  float val = 2;
}