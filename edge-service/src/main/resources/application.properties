quarkus.http.port=8082
quarkus.devservices.enabled=false

# REST
quarkus.rest.jackson.optimization.enable-reflection-free-serializers=true

# FILTER
filter.power-p-in.consume=true
filter.power-j-in.consume=true
filter.smoke-p-in.consume=true
filter.smoke-j-in.consume=true
filter.air-j-in.consume=true
filter.air-p-in.consume=true
filter.batt-j-in.consume=true
filter.batt-p-in.consume=true

# MQTT MESSAGING
MAIN_CONNECTOR = smallrye-mqtt-hivemq

mp.messaging.connector.smallrye-mqtt-hivemq.host=localhost
mp.messaging.connector.smallrye-mqtt-hivemq.port=1883

mp.messaging.incoming.power-p-in.connector=${MAIN_CONNECTOR}
mp.messaging.incoming.power-p-in.topic=dev/power/p
mp.messaging.incoming.power-p-in.client-id=edge-consumer-power-p

mp.messaging.incoming.power-j-in.connector=${MAIN_CONNECTOR}
mp.messaging.incoming.power-j-in.topic=dev/power/j
mp.messaging.incoming.power-j-in.client-id=edge-consumer-power-j

mp.messaging.incoming.smoke-p-in.connector=${MAIN_CONNECTOR}
mp.messaging.incoming.smoke-p-in.topic=dev/smoke/p
mp.messaging.incoming.smoke-p-in.client-id=edge-consumer-smoke-p

mp.messaging.incoming.smoke-j-in.connector=${MAIN_CONNECTOR}
mp.messaging.incoming.smoke-j-in.topic=dev/smoke/j
mp.messaging.incoming.smoke-j-in.client-id=edge-consumer-smoke-j

mp.messaging.incoming.air-j-in.connector=${MAIN_CONNECTOR}
mp.messaging.incoming.air-j-in.topic=dev/air/j
mp.messaging.incoming.air-j-in.client-id=edge-consumer-air-j

mp.messaging.incoming.air-p-in.connector=${MAIN_CONNECTOR}
mp.messaging.incoming.air-p-in.topic=dev/air/p
mp.messaging.incoming.air-p-in.client-id=edge-consumer-air-p

mp.messaging.incoming.batt-j-in.connector=${MAIN_CONNECTOR}
mp.messaging.incoming.batt-j-in.topic=dev/batt/j
mp.messaging.incoming.batt-j-in.client-id=edge-consumer-batt-j

mp.messaging.incoming.batt-p-in.connector=${MAIN_CONNECTOR}
mp.messaging.incoming.batt-p-in.topic=dev/batt/p
mp.messaging.incoming.batt-p-in.client-id=edge-consumer-batt-p

# KAFKA/REDPANDA MESSAGING
kafka.bootstrap.servers=localhost:19092

mp.messaging.outgoing.power-out.connector=smallrye-kafka
mp.messaging.outgoing.power-out.topic=power-consumption-events
mp.messaging.outgoing.power-out.merge=true
mp.messaging.outgoing.power-out.value.serializer=io.confluent.kafka.serializers.protobuf.KafkaProtobufSerializer

mp.messaging.outgoing.smoke-out.connector=smallrye-kafka
mp.messaging.outgoing.smoke-out.topic=smoke-consumption-events
mp.messaging.outgoing.smoke-out.merge=true
mp.messaging.outgoing.smoke-out.value.serializer=io.confluent.kafka.serializers.protobuf.KafkaProtobufSerializer

mp.messaging.outgoing.air-out.connector=smallrye-kafka
mp.messaging.outgoing.air-out.topic=air-consumption-events
mp.messaging.outgoing.air-out.merge=true
mp.messaging.outgoing.air-out.value.serializer=io.confluent.kafka.serializers.protobuf.KafkaProtobufSerializer

mp.messaging.outgoing.batt-out.connector=smallrye-kafka
mp.messaging.outgoing.batt-out.topic=batt-consumption-events
mp.messaging.outgoing.batt-out.merge=true
mp.messaging.outgoing.batt-out.value.serializer=io.confluent.kafka.serializers.protobuf.KafkaProtobufSerializer

kafka.schema.registry.url=http://localhost:18091
kafka.auto.register.schemas=true

# ========================================
# OPENTELEMETRY
# ========================================

quarkus.otel.exporter.otlp.endpoint=http://localhost:4317

# METRICS
smallrye.messaging.observation.enabled=true
quarkus.otel.metrics.enabled=true
quarkus.micrometer.binder.kafka.enabled=true
quarkus.otel.metric.export.interval=10s

# LOGGING
quarkus.log.console.json.enabled=false
quarkus.otel.logs.enabled=true

# TODO
quarkus.otel.traces.exporter=none