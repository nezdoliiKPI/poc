quarkus.http.port=8082

# METRICS
quarkus.micrometer.export.otlp.enabled=true
quarkus.micrometer.export.otlp.url=http://localhost:4317/v1/metrics
quarkus.micrometer.export.otlp.step=10s

# MESSAGING
mp.messaging.connector.smallrye-mqtt.auto-clean-session=false
mp.messaging.connector.smallrye-mqtt.auto-generated-client-id=false

mp.messaging.incoming.air-j-in.connector=smallrye-mqtt-hivemq
mp.messaging.incoming.air-j-in.host=localhost
mp.messaging.incoming.air-j-in.port=1883
mp.messaging.incoming.air-j-in.topic=dev/air/j
mp.messaging.incoming.air-j-in.client-id=air-json-consumer
mp.messaging.incoming.air-j-in.qos=1
mp.messaging.incoming.air-j-in.max-inflight-queue=10
mp.messaging.incoming.air-j-in.buffer-size=50

mp.messaging.incoming.air-p-in.connector=smallrye-mqtt-hivemq
mp.messaging.incoming.air-p-in.host=localhost
mp.messaging.incoming.air-p-in.port=1883
mp.messaging.incoming.air-p-in.topic=dev/air/p
mp.messaging.incoming.air-p-in.client-id=air-proto-consumer
mp.messaging.incoming.air-p-in.qos=1
mp.messaging.incoming.air-p-in.max-inflight-queue=10
mp.messaging.incoming.air-p-in.buffer-size=50

