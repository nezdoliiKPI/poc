quarkus.http.port=8082
quarkus.devservices.enabled=false

# REST
quarkus.rest.jackson.optimization.enable-reflection-free-serializers=true

# FILTER
filter.power-p-in.consume=true
filter.power-p-in.threshold=4

filter.power-j-in.consume=true
filter.power-j-in.threshold=4

filter.smoke-p-in.consume=true
filter.smoke-j-in.consume=true

filter.air-j-in.consume=true
filter.air-j-in.threshold=4

filter.air-p-in.consume=true
filter.air-p-in.threshold=4

filter.batt-j-in.consume=true
filter.batt-p-in.consume=true

filter.temp-j-in.consume=true
filter.temp-j-in.threshold=4

filter.temp-p-in.consume=true
filter.temp-p-in.threshold=4

MAIN_CONNECTOR = smallrye-mqtt-hivemq

mp.messaging.connector.smallrye-mqtt-hivemq.host=localhost
mp.messaging.connector.smallrye-mqtt-hivemq.port=1883

mp.messaging.incoming.power-p-in.connector=${MAIN_CONNECTOR}
mp.messaging.incoming.power-p-in.topic=dev/power/p
mp.messaging.incoming.power-p-in.client-id=edge-consumer-power-p
mp.messaging.incoming.power-p-in.qos=1

mp.messaging.incoming.power-j-in.connector=${MAIN_CONNECTOR}
mp.messaging.incoming.power-j-in.topic=dev/power/j
mp.messaging.incoming.power-j-in.client-id=edge-consumer-power-j
mp.messaging.incoming.power-j-in.qos=1

mp.messaging.incoming.smoke-p-in.connector=${MAIN_CONNECTOR}
mp.messaging.incoming.smoke-p-in.topic=dev/smoke/p
mp.messaging.incoming.smoke-p-in.client-id=edge-consumer-smoke-p
mp.messaging.incoming.smoke-p-in.qos=1

mp.messaging.incoming.smoke-j-in.connector=${MAIN_CONNECTOR}
mp.messaging.incoming.smoke-j-in.topic=dev/smoke/j
mp.messaging.incoming.smoke-j-in.client-id=edge-consumer-smoke-j
mp.messaging.incoming.smoke-j-in.qos=1

mp.messaging.incoming.air-j-in.connector=${MAIN_CONNECTOR}
mp.messaging.incoming.air-j-in.topic=dev/air/j
mp.messaging.incoming.air-j-in.client-id=edge-consumer-air-j
mp.messaging.incoming.air-j-in.qos=1

mp.messaging.incoming.air-p-in.connector=${MAIN_CONNECTOR}
mp.messaging.incoming.air-p-in.topic=dev/air/p
mp.messaging.incoming.air-p-in.client-id=edge-consumer-air-p
mp.messaging.incoming.air-p-in.qos=1

mp.messaging.incoming.batt-j-in.connector=${MAIN_CONNECTOR}
mp.messaging.incoming.batt-j-in.topic=dev/batt/j
mp.messaging.incoming.batt-j-in.client-id=edge-consumer-batt-j
mp.messaging.incoming.batt-j-in.qos=1

mp.messaging.incoming.batt-p-in.connector=${MAIN_CONNECTOR}
mp.messaging.incoming.batt-p-in.topic=dev/batt/p
mp.messaging.incoming.batt-p-in.client-id=edge-consumer-batt-p
mp.messaging.incoming.batt-p-in.qos=1

mp.messaging.incoming.temp-p-in.connector=${MAIN_CONNECTOR}
mp.messaging.incoming.temp-p-in.topic=dev/temp/p
mp.messaging.incoming.temp-p-in.client-id=edge-consumer-temp-p
mp.messaging.incoming.temp-p-in.qos=1

mp.messaging.incoming.temp-j-in.connector=${MAIN_CONNECTOR}
mp.messaging.incoming.temp-j-in.topic=dev/temp/j
mp.messaging.incoming.temp-j-in.client-id=edge-consumer-temp-j
mp.messaging.incoming.temp-j-in.qos=1

# KAFKA/REDPANDA MESSAGING
kafka.bootstrap.servers=host.docker.internal:19092

mp.messaging.outgoing.power-out.key.serializer=org.apache.kafka.common.serialization.LongSerializer
mp.messaging.outgoing.smoke-out.key.serializer=org.apache.kafka.common.serialization.LongSerializer
mp.messaging.outgoing.air-out.key.serializer=org.apache.kafka.common.serialization.LongSerializer
mp.messaging.outgoing.batt-out.key.serializer=org.apache.kafka.common.serialization.LongSerializer
mp.messaging.outgoing.temp-out.key.serializer=org.apache.kafka.common.serialization.LongSerializer

mp.messaging.outgoing.power-out.acks=1
mp.messaging.outgoing.smoke-out.acks=1
mp.messaging.outgoing.air-out.acks=1
mp.messaging.outgoing.batt-out.acks=1
mp.messaging.outgoing.temp-out.acks=1

mp.messaging.outgoing.power-out.linger.ms=2
mp.messaging.outgoing.smoke-out.linger.ms=2
mp.messaging.outgoing.air-out.linger.ms=2
mp.messaging.outgoing.batt-out.linger.ms=2
mp.messaging.outgoing.temp-out.linger.ms=2

mp.messaging.outgoing.power-out.batch.size=65536
mp.messaging.outgoing.smoke-out.batch.size=65536
mp.messaging.outgoing.air-out.batch.size=65536
mp.messaging.outgoing.batt-out.batch.size=65536
mp.messaging.outgoing.temp-out.batch.size=65536

mp.messaging.outgoing.power-out.overflow-buffer-size=20000
mp.messaging.outgoing.smoke-out.overflow-buffer-size=20000
mp.messaging.outgoing.air-out.overflow-buffer-size=20000
mp.messaging.outgoing.batt-out.overflow-buffer-size=20000
mp.messaging.outgoing.temp-out.overflow-buffer-size=20000

mp.messaging.outgoing.power-out.max-inflight-messages=20000
mp.messaging.outgoing.smoke-out.max-inflight-messages=20000
mp.messaging.outgoing.air-out.max-inflight-messages=20000
mp.messaging.outgoing.batt-out.max-inflight-messages=20000
mp.messaging.outgoing.temp-out.max-inflight-messages=20000

mp.messaging.outgoing.power-out.compression.type=lz4
mp.messaging.outgoing.smoke-out.compression.type=lz4
mp.messaging.outgoing.air-out.compression.type=lz4
mp.messaging.outgoing.batt-out.compression.type=lz4
mp.messaging.outgoing.temp-out.compression.type=lz4

mp.messaging.outgoing.power-out.connector=smallrye-kafka
mp.messaging.outgoing.power-out.topic=power-consumption-events
mp.messaging.outgoing.power-out.merge=true
mp.messaging.outgoing.power-out.value.serializer=dev.nez.edge.dto.ProtobufSerializer

mp.messaging.outgoing.smoke-out.connector=smallrye-kafka
mp.messaging.outgoing.smoke-out.topic=smoke-consumption-events
mp.messaging.outgoing.smoke-out.merge=true
mp.messaging.outgoing.smoke-out.value.serializer=dev.nez.edge.dto.ProtobufSerializer

mp.messaging.outgoing.air-out.connector=smallrye-kafka
mp.messaging.outgoing.air-out.topic=air-consumption-events
mp.messaging.outgoing.air-out.merge=true
mp.messaging.outgoing.air-out.value.serializer=dev.nez.edge.dto.ProtobufSerializer

mp.messaging.outgoing.batt-out.connector=smallrye-kafka
mp.messaging.outgoing.batt-out.topic=batt-consumption-events
mp.messaging.outgoing.batt-out.merge=true
mp.messaging.outgoing.batt-out.value.serializer=dev.nez.edge.dto.ProtobufSerializer

mp.messaging.outgoing.temp-out.connector=smallrye-kafka
mp.messaging.outgoing.temp-out.topic=temp-consumption-events
mp.messaging.outgoing.temp-out.merge=true
mp.messaging.outgoing.temp-out.value.serializer=dev.nez.edge.dto.ProtobufSerializer

# ========================================
# OPENTELEMETRY
# ========================================

quarkus.otel.exporter.otlp.endpoint=http://host.docker.internal:4317

# METRICS
smallrye.messaging.observation.enabled=true
quarkus.otel.metrics.enabled=true
quarkus.micrometer.binder.kafka.enabled=true
quarkus.otel.metric.export.interval=10s

# LOGGING
quarkus.otel.logs.enabled=true

# TRACES
quarkus.otel.bsp.schedule.delay=10s
quarkus.otel.traces.sampler=parentbased_traceidratio
quarkus.otel.traces.sampler.arg=0.1