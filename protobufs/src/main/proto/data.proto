syntax = "proto3";

import "google/protobuf/timestamp.proto";

package timeddata;

option java_multiple_files = true;
option java_package = "dev.nez.dto.proto.timeddata";
option java_outer_classname = "TimedProtos";

// Represents a single reading of power consumption telemetry from a device.
//
// Attributes:
//   - timestamp: The exact time the service received and processed this message (UTC).
//   - device_id: The unique identifier of the sensor or device.
//   - voltage:   The electrical voltage level in volts (V).
//   - current:   The electrical current flow in amperes (A).
//   - power:     The active power consumption in watts (W).
message PowerConsumptionData {
  google.protobuf.Timestamp timestamp = 5;
  int64 device_id = 1;
  float voltage = 2;
  float current = 3;
  float power = 4;
}

// Represents a single reading of air quality telemetry from a sensor.
//
// Attributes:
//   - timestamp:   The exact time the service received and processed this message (UTC).
//   - device_id:   The unique identifier of the sensor or device.
//   - co2:         Carbon Dioxide (CO2) concentration in parts per million (ppm).
//   - pm25:        Particulate Matter (PM2.5) concentration in µg/m³.
//   - pm10:        Particulate Matter (PM10) concentration in µg/m³.
//   - tvoc:        Total Volatile Organic Compounds (TVOC) in mg/m³.
//   - temperature: Ambient air temperature in degrees Celsius.
//   - humidity:    Relative humidity percentage (0.0 to 100.0).
message AirQualityData {
  google.protobuf.Timestamp timestamp = 8;
  int64 device_id = 1;
  int32 co2 = 2;
  float pm25 = 3;
  float pm10 = 4;
  float tvoc = 5;
  float temperature = 6;
  float humidity = 7;
}

// Represents a single reading from a smoke and gas detection sensor.
//
// Attributes:
//   - timestamp: The exact time the service received and processed this message (UTC).
//   - device_id: The unique identifier of the sensor or device.
//   - smoke_raw: Raw analog or digital reading from the photoelectric/ionization smoke sensor.
//   - co_level:  Carbon Monoxide (CO) concentration in parts per million (ppm).
message SmokeDetectorData {
  google.protobuf.Timestamp timestamp = 4;
  int64 device_id = 1;
  int32 smoke_raw = 2;
  int32 co_level = 3;
}

// Represents a single reading of battery status telemetry.
//
// Attributes:
//   - timestamp: The exact time the service received and processed this message (UTC).
//   - device_id: The unique identifier of the sensor or device.
//   - val:       The current battery voltage level in volts (V) or remaining capacity percentage.
message BatteryData {
  google.protobuf.Timestamp timestamp = 3;
  int64 device_id = 1;
  float val = 2;
}

// Represents a single reading of temperature (and optional humidity) telemetry from a device.
//
// Attributes:
//   - timestamp: The exact time the service received and processed this message (UTC).
//   - device_id:   The unique identifier of the sensor or device.
//   - temperature: The ambient temperature in degrees Celsius (°C).
//   - humidity:    The relative humidity percentage (%).
message TemperatureData {
  google.protobuf.Timestamp timestamp = 4;
  int64 device_id = 1;
  float temperature = 2;
  float humidity = 3;
}

// Represents an alert event in the system.
//
// Attributes:
//   - uuid:      The unique identifier of the alert event.
//   - device_id: The unique identifier of the device associated with the alert.
//   - metric:    The name of the metric that triggered the alert (e.g., "co2", "temperature").
//   - value:     The actual numerical value that breached the threshold.
//   - min:       The minimum allowable threshold for the metric.
//   - max:       The maximum allowable threshold for the metric.
//   - severity:  The severity level of the alert (WARNING, CRITICAL, FAULT).
//   - message:   A descriptive message regarding the incident or event.
//   - timestamp: The timestamp when the data was received.
message AlertData {
  enum Severity {
    WARNING = 0;
    CRITICAL = 1;
    FAULT = 2;
  }

  google.protobuf.Timestamp timestamp = 9;
  string uuid = 1;
  int64 device_id = 2;
  string metric = 3;
  float value = 4;

  optional float min = 5;
  optional float max = 6;

  Severity severity = 7;
  string message = 8;
}