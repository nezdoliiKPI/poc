quarkus.http.port=8081

smallrye.jwt.new-token.signature-algorithm=RS256
smallrye.jwt.sign.key.location=${SECRETS_DIR:../secrets}/jwt/private.pem

jwt.key.id=Hkn7Yqe8yC8XAJHiEJPmDqBqMfoDzPhgid691GNEgSw
auth.jwt.issuer=auth-service

# BASIC AUTH
quarkus.http.auth.basic=true
quarkus.config.locations=${SECRETS_DIR:../secrets}/admin/credentials.properties

# DATABASE
quarkus.datasource.db-kind=PostgreSQL

# TODO dev.quarkus.hibernate-orm.schema-management.strategy
%dev.quarkus.hibernate-orm.schema-management.strategy=update
%dev.quarkus.datasource.username=postgres
%dev.quarkus.datasource.password=postgres
%dev.quarkus.datasource.reactive.url=postgresql://localhost:5432/iot
quarkus.datasource.reactive.max-size=40

# ORM BATCHING
quarkus.hibernate-orm.jdbc.statement-batch-size=50
quarkus.hibernate-orm.jdbc.order-inserts=true
quarkus.hibernate-orm.jdbc.order-updates=true
quarkus.hibernate-orm.fetch.batch-size=20

# METRICS
quarkus.otel.metrics.enabled=true
quarkus.otel.exporter.otlp.metrics.endpoint=http://localhost:4317/v1/metrics
quarkus.otel.metric.export.interval=30s

# LOGGING
# TODO
quarkus.otel.logs.exporter=none
quarkus.hibernate-orm.log.sql=false
