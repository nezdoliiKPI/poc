version: '3.8'
name: redpanda-local
services:

  redpanda:
    build: ../config/redpanda
    image: configured-redpanda:local
    container_name: redpanda-0
    restart: unless-stopped
    ports:
      - 18091:8091  # Schema Registry
      - 18092:8092  # HTTP Proxy
      - 19092:19092 # Kafka API
      - 19644:9644  # Admin API
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda-0:9092,external://host.docker.internal:19092

  redpanda-init:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda-init
    depends_on:
      - redpanda
    entrypoint: [ "" ]
    command:
      - sh
      - -c
      - |
        echo "Waiting for Redpanda to be ready..."
        until rpk cluster info --brokers redpanda-0:9092; do sleep 1; done
        
        echo "Creating EVENTS topics (policy: delete)..."
        
        # Високе навантаження (8 партицій)
        rpk --brokers redpanda-0:9092 topic create power-consumption-events -p 4 --topic-config cleanup.policy=delete --topic-config retention.bytes=268435456 --topic-config segment.bytes=67108864 || true
        
        # Низьке навантаження (1 партиція)
        rpk --brokers redpanda-0:9092 topic create smoke-consumption-events -p 1 --topic-config cleanup.policy=delete --topic-config retention.bytes=67108864 --topic-config segment.bytes=16777216 || true
        rpk --brokers redpanda-0:9092 topic create air-consumption-events -p 1 --topic-config cleanup.policy=delete --topic-config retention.bytes=67108864 --topic-config segment.bytes=16777216 || true
        rpk --brokers redpanda-0:9092 topic create batt-consumption-events -p 1 --topic-config cleanup.policy=delete --topic-config retention.bytes=67108864 --topic-config segment.bytes=16777216 || true
        rpk --brokers redpanda-0:9092 topic create temp-consumption-events -p 1 --topic-config cleanup.policy=delete --topic-config retention.bytes=67108864 --topic-config segment.bytes=16777216 || true
        rpk --brokers redpanda-0:9092 topic create alert-events -p 1 --topic-config cleanup.policy=delete --topic-config retention.bytes=67108864 --topic-config segment.bytes=16777216 || true
        
        echo "Creating THRESHOLDS topics (policy: compact)..."
        
        rpk --brokers redpanda-0:9092 topic create power-thresholds-topic -p 4 --topic-config cleanup.policy=compact || true
        rpk --brokers redpanda-0:9092 topic create smoke-thresholds-topic -p 1 --topic-config cleanup.policy=compact || true
        rpk --brokers redpanda-0:9092 topic create air-thresholds-topic -p 1 --topic-config cleanup.policy=compact || true
        rpk --brokers redpanda-0:9092 topic create batt-thresholds-topic -p 1 --topic-config cleanup.policy=compact || true
        rpk --brokers redpanda-0:9092 topic create temp-thresholds-topic -p 1 --topic-config cleanup.policy=compact || true
        
        echo "Creating CONFIG topics (policy: delete)..."
        
        rpk --brokers redpanda-0:9092 topic create filter-config-topic -p 1 --topic-config cleanup.policy=delete --topic-config retention.bytes=16777216 --topic-config segment.bytes=4194304 || true
        
        echo "Infrastructure ready."

  redpanda-clean-thresholds:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda-clean-thresholds
    depends_on:
      - redpanda
    entrypoint: [ "" ]
    command:
      - sh
      - -c
      - |
        echo "Waiting for Redpanda to be ready..."
        until rpk cluster info --brokers redpanda-0:9092; do sleep 1; done
  
        echo "Cleaning THRESHOLDS topics..."
  
        for topic in power-thresholds-topic smoke-thresholds-topic air-thresholds-topic batt-thresholds-topic temp-thresholds-topic; do
          echo "  Deleting $topic..."
          rpk --brokers redpanda-0:9092 topic delete "$topic" || true
        done
  
        echo "Recreating THRESHOLDS topics (policy: compact)..."
  
        rpk --brokers redpanda-0:9092 topic create power-thresholds-topic -p 8 --topic-config cleanup.policy=compact || true
        rpk --brokers redpanda-0:9092 topic create smoke-thresholds-topic  -p 1 --topic-config cleanup.policy=compact || true
        rpk --brokers redpanda-0:9092 topic create air-thresholds-topic    -p 1 --topic-config cleanup.policy=compact || true
        rpk --brokers redpanda-0:9092 topic create batt-thresholds-topic   -p 1 --topic-config cleanup.policy=compact || true
        rpk --brokers redpanda-0:9092 topic create temp-thresholds-topic   -p 1 --topic-config cleanup.policy=compact || true
  
        echo "THRESHOLDS topics cleaned and recreated."
    profiles:
      - clean

  console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: redpanda-console
    entrypoint: /app/console
    command: --config.filepath=/console-config.yml
    restart: unless-stopped
    ports:
      - 8099:8080
    volumes:
      - ../config/redpanda/console-config.yml:/console-config.yml
    depends_on:
      - redpanda

volumes:
  redpanda-data:
    driver: local