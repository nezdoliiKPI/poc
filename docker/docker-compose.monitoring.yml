version: '3.8'
name: monitoring-local
services:

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus-config/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-remote-write-receiver' # Allows to receive data from Alloy

  alloy:
    image: grafana/alloy:latest
    container_name: grafana-alloy
    ports:
      - "12345:12345"
      - "4317:4317"   # OTLP gRPC receive
      - "4318:4318"   # OTLP HTTP receive
    volumes:
      - ../monitoring/alloy-config/config.alloy:/etc/alloy/config.alloy
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    env_file:
      - ../secrets/admin/credentials.properties
    restart: unless-stopped
    depends_on:
      - prometheus
    volumes:
      - ../monitoring/grafana-config/provisioning:/etc/grafana/provisioning