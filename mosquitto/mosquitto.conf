pid_file /tmp/mosquitto.pid
per_listener_settings true

# ==========================================
# PORT 1882 - IoT DEVICES (JWT Auth + ACL)
# ==========================================
listener 1882
allow_anonymous false

plugin /usr/lib/libmosquitto_jwt_auth.so
auth_opt_jwt_alg ES256
auth_opt_jwt_jwks_file /etc/mosquitto/certs/jwks.json

auth_opt_jwt_validate_sub_match_username true

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type all

# ==========================================
# PORT 1883 - INTERNAL (Quarkus Service A)
# ==========================================
listener 1883 0.0.0.0
allow_anonymous true