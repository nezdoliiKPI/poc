%dev.quarkus.http.port=8086

quarkus.config.locations=${SECRETS_DIR:../config}/secrets/admin/credentials.properties

# ========================================
# DATABASE
# ========================================
quarkus.datasource.db-kind=PostgreSQL
quarkus.datasource.username=${POSTGRES_USER}
quarkus.datasource.password=${POSTGRES_PASSWORD}
quarkus.datasource.reactive.statement-cache-max-size=4096

quarkus.hibernate-orm.schema-management.strategy=none

%dev.quarkus.datasource.reactive.url=postgresql://localhost:5432/iot
%prod.quarkus.datasource.reactive.url=postgresql://host.docker.internal:5432/iot

# ========================================
# CACHE
# ========================================
quarkus.cache.caffeine.history-power.expire-after-write=10M
quarkus.cache.caffeine.history-temperature.expire-after-write=10M
quarkus.cache.caffeine.history-air-quality.expire-after-write=10M
quarkus.cache.caffeine.history-battery.expire-after-write=10M
quarkus.cache.caffeine.history-smoke.expire-after-write=10M

# ========================================
# KAFKA/REDPANDA MESSAGING
# ========================================
kafka.bootstrap.servers=host.docker.internal:19092
kafka.group.id=main-service-group

mp.messaging.incoming.power-consumption.connector=smallrye-kafka
mp.messaging.incoming.power-consumption.topic=power-consumption-events
mp.messaging.incoming.power-consumption.value.deserializer=\
  dev.nez.model.deserealizer.PowerConsumptionDeserializer

mp.messaging.incoming.air-quality.connector=smallrye-kafka
mp.messaging.incoming.air-quality.topic=air-consumption-events
mp.messaging.incoming.air-quality.value.deserializer=\
  dev.nez.model.deserealizer.AirQualityDeserializer

mp.messaging.incoming.smoke-detector.connector=smallrye-kafka
mp.messaging.incoming.smoke-detector.topic=smoke-consumption-events
mp.messaging.incoming.smoke-detector.value.deserializer=\
  dev.nez.model.deserealizer.SmokeDetectorDeserializer

mp.messaging.incoming.battery.connector=smallrye-kafka
mp.messaging.incoming.battery.topic=batt-consumption-events
mp.messaging.incoming.battery.value.deserializer=\
  dev.nez.model.deserealizer.BatteryDataDeserializer

mp.messaging.incoming.temperature.connector=smallrye-kafka
mp.messaging.incoming.temperature.topic=temp-consumption-events
mp.messaging.incoming.temperature.value.deserializer=\
  dev.nez.model.deserealizer.TemperatureDeserializer

mp.messaging.incoming.power-consumption.key.deserializer=\
  org.apache.kafka.common.serialization.LongDeserializer
mp.messaging.incoming.air-quality.key.deserializer=\
  org.apache.kafka.common.serialization.LongDeserializer
mp.messaging.incoming.smoke-detector.key.deserializer=\
  org.apache.kafka.common.serialization.LongDeserializer
mp.messaging.incoming.battery.key.deserializer=\
  org.apache.kafka.common.serialization.LongDeserializer
mp.messaging.incoming.temperature.key.deserializer=\
  org.apache.kafka.common.serialization.LongDeserializer

