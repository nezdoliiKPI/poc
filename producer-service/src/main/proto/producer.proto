syntax = "proto3";

option java_multiple_files = true;
option java_package = "dev.nez.simulation.dto.mqtt";
option java_outer_classname = "ProducerProtos";

message PowerConsumptionMessage {
  int64 device_id = 1;
  float voltage = 2;
  float current = 3;
  float power = 4;
}

message AirQualityMessage {
  int64 device_id = 1;
  int32 co2 = 2;
  float pm25 = 3;
  float pm10 = 4;
  float tvoc = 5;
  float temperature = 6;
  float humidity = 7;
}

message SmokeDetectorMessage {
  int64 device_id = 1;
  int32 smoke_raw = 2;
  int32 co_level = 3;
}

message BatteryMessage {
  int64 device_id = 1;
  float val = 2;
}