quarkus.http.port=8084
quarkus.config.locations=${SECRETS_DIR:../secrets}/admin/credentials.properties

quarkus.native.resources.includes=**/*.pem,**/*.crt,**/*.jks

# MQTT
mqtt.broker.host = localhost
%prod.mqtt.broker.host = host.docker.internal

mqtt.broker.port = 1882

# REST
quarkus.rest.jackson.optimization.enable-reflection-free-serializers=true

quarkus.rest-client.auth-api.url = http://localhost:8081
quarkus.rest-client.auth-api.read-timeout=15000

quarkus.rest-client.edge-api.url = http://localhost:8082

%prod.quarkus.rest-client.auth-api.url = http://host.docker.internal:8081
%prod.quarkus.rest-client.edge-api.url = http://host.docker.internal:8082

# BASIC AUTH
quarkus.http.auth.basic=true

# TLS
mqtt.broker.ca-path = ${SECRETS_DIR:../secrets}/tls/ca.crt

# GENERATE SETTINGS
gen.air.proto.count = 1
gen.air.proto.topic = dev/air/p
gen.air.json.count = 1
gen.air.json.topic = dev/air/j

gen.power.proto.count = 1
gen.power.proto.topic = dev/power/p
gen.power.json.count = 1
gen.power.json.topic = dev/power/j

gen.smoke.proto.count = 1
gen.smoke.proto.topic = dev/smoke/p
gen.smoke.json.count = 1
gen.smoke.json.topic = dev/smoke/j

gen.battery.proto.topic = dev/batt/p
gen.battery.json.topic = dev/batt/j

# LOGGING
# quarkus.log.level=DEBUG
quarkus.log.category."io.vertx.mqtt.impl.MqttClientImpl".level=WARN
