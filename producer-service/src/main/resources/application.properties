quarkus.http.ssl-port=8084
quarkus.http.ssl.certificate.files=${SECRETS_DIR:../secrets}/tls/server.crt
quarkus.http.ssl.certificate.key-files=${SECRETS_DIR:../secrets}/tls/server.key
quarkus.http.insecure-requests=disabled

quarkus.config.locations=${SECRETS_DIR:../secrets}/admin/credentials.properties

quarkus.native.resources.includes=**/*.pem,**/*.crt,**/*.jks

# MQTT
mqtt.broker.host = localhost
%prod.mqtt.broker.host = host.docker.internal

mqtt.broker.port = 1882

# REST
quarkus.rest.jackson.optimization.enable-reflection-free-serializers=true

quarkus.rest-client.auth-api.url = https://localhost:8081
quarkus.rest-client.auth-api.read-timeout=15000

quarkus.tls.insecure-tls.trust-all=true
quarkus.rest-client.auth-api.tls-configuration-name=insecure-tls

quarkus.rest-client.edge-api.url = http://localhost:8082

%prod.quarkus.rest-client.auth-api.url = https://host.docker.internal:8081
%prod.quarkus.rest-client.edge-api.url = http://host.docker.internal:8082

# BASIC AUTH
quarkus.http.auth.basic=true

# TLS
mqtt.broker.ca-path = ${SECRETS_DIR:../secrets}/tls/ca.crt

# GENERATE SETTINGS
gen.air.proto.count = 1
gen.air.proto.topic = dev/air/p
gen.air.json.count = 1
gen.air.json.topic = dev/air/j

gen.power.proto.count = 1
gen.power.proto.topic = dev/power/p
gen.power.json.count = 1
gen.power.json.topic = dev/power/j

gen.smoke.proto.count = 1
gen.smoke.proto.topic = dev/smoke/p
gen.smoke.json.count = 1
gen.smoke.json.topic = dev/smoke/j

gen.temp.proto.count = 1
gen.temp.proto.topic = dev/temp/p
gen.temp.json.count = 1
gen.temp.json.topic = dev/temp/j

gen.battery.proto.topic = dev/batt/p
gen.battery.json.topic = dev/batt/j

# ========================================
# KAFKA OUTGOING CHANNELS (THRESHOLDS)
# ========================================
kafka.bootstrap.servers=host.docker.internal:19092
kafka.producer.batch.size=65536
kafka.producer.linger.ms=10
kafka.producer.max.in.flight.requests.per.connection=100

# --- Air Quality ---
mp.messaging.outgoing.air-thresholds-out.connector=smallrye-kafka
mp.messaging.outgoing.air-thresholds-out.topic=air-thresholds-topic
mp.messaging.outgoing.air-thresholds-out.key.serializer=org.apache.kafka.common.serialization.LongSerializer
mp.messaging.outgoing.air-thresholds-out.value.serializer=dev.nez.panel.dto.JsonSerializer

# --- Battery ---
mp.messaging.outgoing.battery-thresholds-out.connector=smallrye-kafka
mp.messaging.outgoing.battery-thresholds-out.topic=batt-thresholds-topic
mp.messaging.outgoing.battery-thresholds-out.key.serializer=org.apache.kafka.common.serialization.LongSerializer
mp.messaging.outgoing.battery-thresholds-out.value.serializer=dev.nez.panel.dto.JsonSerializer

# --- Power ---
mp.messaging.outgoing.power-thresholds-out.connector=smallrye-kafka
mp.messaging.outgoing.power-thresholds-out.topic=power-thresholds-topic
mp.messaging.outgoing.power-thresholds-out.key.serializer=org.apache.kafka.common.serialization.LongSerializer
mp.messaging.outgoing.power-thresholds-out.value.serializer=dev.nez.panel.dto.JsonSerializer

# --- Smoke ---
mp.messaging.outgoing.smoke-thresholds-out.connector=smallrye-kafka
mp.messaging.outgoing.smoke-thresholds-out.topic=smoke-thresholds-topic
mp.messaging.outgoing.smoke-thresholds-out.key.serializer=org.apache.kafka.common.serialization.LongSerializer
mp.messaging.outgoing.smoke-thresholds-out.value.serializer=dev.nez.panel.dto.JsonSerializer

# --- Temperature ---
mp.messaging.outgoing.temperature-thresholds-out.connector=smallrye-kafka
mp.messaging.outgoing.temperature-thresholds-out.topic=temp-thresholds-topic
mp.messaging.outgoing.temperature-thresholds-out.key.serializer=org.apache.kafka.common.serialization.LongSerializer
mp.messaging.outgoing.temperature-thresholds-out.value.serializer=dev.nez.panel.dto.JsonSerializer

# LOGGING
# quarkus.log.level=DEBUG
quarkus.log.category."io.vertx.mqtt.impl.MqttClientImpl".level=WARN
